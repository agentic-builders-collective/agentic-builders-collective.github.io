name: Notify production deployers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  email:
    name: Send Resend email
    runs-on: ubuntu-latest

    steps:
      - name: Validate Resend API key
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAILS: ${{ vars.RESEND_TO_EMAILS }}
        run: |
          test -n "$RESEND_API_KEY"
          test -n "$RESEND_FROM_EMAIL"
          test -n "$RESEND_TO_EMAILS"

      - name: Send production handoff email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAILS: ${{ vars.RESEND_TO_EMAILS }}
        run: |
          set -euo pipefail

          repo_url="https://github.com/${GITHUB_REPOSITORY}"
          tag_url="${repo_url}/tree/${GITHUB_REF_NAME}"
          subject="ABC website tagged ${GITHUB_REF_NAME}"
          text_body="$(cat <<EOF
          Hello,

          Tagged a new version at ${repo_url}: ${GITHUB_REF_NAME}

          Tag: ${tag_url}

          Please push it to agenticbuilders.sg.

          Thank you!
          EOF
          )"

          jq -n \
            --arg from "$RESEND_FROM_EMAIL" \
            --arg to "$RESEND_TO_EMAILS" \
            --arg subject "$subject" \
            --arg text "$text_body" \
            '{from: $from, to: ($to | split(",") | map(gsub("^\\s+|\\s+$"; ""))), subject: $subject, text: $text}' \
            | curl --fail-with-body --show-error --silent \
              --request POST "https://api.resend.com/emails" \
              --header "Authorization: Bearer ${RESEND_API_KEY}" \
              --header "Content-Type: application/json" \
              --data @-
